name: Gerar APK Rodrigues Entregador V6.18.0

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Instalar SDK Android
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3
      - name: Conferir versao
        run: grep -R "versionCode\|versionName" app/build.gradle.kts
      - name: Gerar APK Debug
        run: gradle --no-daemon clean :app:assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rodrigues-Entregador-V6-18-0-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
