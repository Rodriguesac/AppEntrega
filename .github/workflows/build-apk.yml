name: Build Rodrigues Entregador Nativo APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle na nuvem
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Conferir google-services.json
        run: test -f app/google-services.json

      - name: Gerar APK debug
        run: gradle --no-daemon clean :app:assembleDebug --stacktrace

      - name: Enviar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: Rodrigues-Entregador-Nativo-V10-Fonte-Embarcada
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
